<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
    <link rel="icon" type="image/png" sizes="192x192" href="./pwa-192.png" />
    <link rel="icon" type="image/png" sizes="512x512" href="./pwa-512.png" />
    <link rel="apple-touch-icon" href="./apple-touch-icon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0A66C2" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="Garry" />
    <meta name="application-name" content="Garry Micro Dev Utilities" />
    <title>Garry Micro Dev Utilities · Local-first utilities</title>
    <meta
      name="description"
      content="Garry Micro Dev Utilities: fast, private, browser-only tools for JSON, APIs, JSON Web Tokens (JWT), OpenAPI specs, data formats, planning, and architecture. No server. No login."
    />
    <meta
      name="keywords"
      content="Garry, developer tools, browser utilities, JavaScript Object Notation (JSON), YAML, JSON Web Token (JWT), OpenAPI, cURL, application programming interface (API), local-first, privacy, RACI, architecture decision record (ADR), non-functional requirements (NFR)"
    />
    <script>
      // Prevent flash of unstyled content
      (function () {
        const theme = localStorage.getItem('garry-micro-dev-utilities-theme');
        const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        const shouldBeDark = theme ? theme === '"dark"' : prefersDark;
        if (shouldBeDark) {
          document.documentElement.classList.add('dark');
        } else {
          document.documentElement.classList.remove('dark');
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
